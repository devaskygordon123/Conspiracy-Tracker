<!DOCTYPE html>
<html>
<head>
    <title>Daily New Conspiracy Tracker</title>
    <style>
        body { background-color: black; color: #00FF00; font-family: monospace; text-align: center; }
        .box { border: 2px solid #00FF00; padding: 20px; margin: 20px; text-align: left; }
    </style>
</head>
<body>

    <h1>🤖 Robot Conspiracy Tracker 🤖</h1>
    <p>Brand new theories detected today:</p>
    
    <div class="box" id="conspiracy-data">
        Loading data...
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                let text = data.conspiracies.replace(/\n/g, "<br>");
                document.getElementById('conspiracy-data').innerHTML = text;
            });
    </script>

</body>
</html>
